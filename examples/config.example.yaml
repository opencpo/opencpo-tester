# OCPP Compliance Tester — Configuration
# Copy and adjust for your setup. All fields are optional; defaults are shown.

server:
  port: 9300
  host: "0.0.0.0"
  tls: false
  # tls_cert: "/etc/ssl/certs/ocpp-tester.crt"
  # tls_key: "/etc/ssl/private/ocpp-tester.key"

charger:
  num_connectors: 1

timing:
  heartbeat_interval: 30     # Seconds to request for heartbeat
  meter_interval: 10         # Seconds between MeterValues samples
  boot_timeout: 60           # Max seconds to wait for charger to connect
  test_timeout: 120          # Per-test timeout in seconds
  transaction_start_max: 5   # Max seconds to wait for StartTransaction after RemoteStartTransaction

tests:
  skip: []                   # Categories to skip, e.g. ["firmware", "smart_charging"]
  only: []                   # If set, only run these categories
  full: false                # Include slow/risky tests (firmware, diagnostics)
  interactive: true          # Enable prompts for tests requiring physical actions

rfid:
  valid_tag: "TESTCARD01"    # RFID tag to use for authorization tests
  invalid_tag: "DEADBEEF99"  # RFID tag to reject

report:
  format: "both"             # "pdf", "html", "both", or "none"
  output: null               # Output filename prefix (null = auto-generate)

branding:
  company: "OCPP Compliance Tester"
  # logo_path: null          # White/light logo for dark header
  # logo_color_path: null    # Color logo for light sections
  primary_color: "#1e3a5f"
  accent_color: "#2563eb"
  green_color: "#16a34a"

# ── AI Profile Generation ──────────────────────────────────────────────────────
# Use AI to automatically generate a ChargerProfile dataclass after testing.
# The profile captures all observed behavior, quirks, and compliance gaps.
# Enable with `ai.enabled: true` or with the --generate-profile CLI flag.
ai:
  enabled: false
  provider: "ollama"                    # "ollama" or "openai-compatible"
  api_url: "http://127.0.0.1:11434"    # Ollama default; or any OpenAI-compatible endpoint
  api_key: ""                          # Optional — for cloud providers
  model: "llama3.3:70b"               # Model to use (any Ollama or OpenAI-compatible model)
  timeout: 120                         # Seconds to wait for LLM response

# Examples:
#
# Local Ollama (default):
#   api_url: "http://127.0.0.1:11434"
#   model: "llama3.3:70b"
#
# OpenAI:
#   api_url: "https://api.openai.com/v1"
#   api_key: "sk-..."
#   model: "gpt-4o"
#
# Local OpenAI-compatible (LM Studio, vLLM, etc.):
#   api_url: "http://localhost:1234/v1"
#   model: "llama-3.3-70b-instruct"
